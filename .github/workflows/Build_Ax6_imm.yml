name: Build_Ax6_imm
run-name: Release - ${{ inputs.model || 'RedMi-AX6_plus_imm'}}

on: 
  repository_dispatch:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出
        uses: actions/checkout@v5

      - name: 可用磁盘空间
        uses: sbwml/actions@free-disk

      - name: 构建系统设置
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload


      - name: 设置构建日期和时区
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./compilecfg/${{ inputs.model || 'RedMi-AX6_plus_imm'}}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: 克隆固件代码
        env:
          REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
          REPO_BRANCH: main
          BUILD_DIR: imm-nss
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH $BUILD_DIR
          cd $BUILD_DIR
          cp -f ../diy/imm/imm1.sh ./
          chmod +x ./imm1.sh && ./imm1.sh

      - name: Update & Install feeds
        working-directory: ./imm-nss
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -f ../diy/imm/imm2.sh ./
          chmod +x ./imm2.sh && ./imm2.sh

      - name: Configuration Customization
        run: |
          [ -e "./configs/AX6_imm.config" ] && mv "./configs/AX6_imm.config" imm-nss/.config
          cd imm-nss && make defconfig

      - name: Download package
        working-directory: ./imm-nss
        run: |
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        working-directory: ./imm-nss
        run: |
          make -j$(nproc) V=s

      - name: Assemble Artifact
        id: assemble_artifact
        run: |
          rm -rf ./AX6_Out
          mkdir -p ./AX6_Out/
          cp -a ./imm-nss/.config ./AX6_Out/AX6_imm.config
          
          getmd5() {
            md5sum=`md5sum $1`
            md5=`echo ${md5sum% *}`
            md5=`echo ${md5:0:10}`
          }
          
          rom=imm-nss/bin/targets/qualcommax/ipq807x/immortalwrt-qualcommax-ipq807x-redmi_ax6-stock-squashfs-sysupgrade.bin
          getmd5 $rom
          cp -a $rom ./AX6_Out/Redmi-AX6-immortalwrt-sysupgrade-$(date +%Y%m%d)_${md5}.bin
          
          rom=imm-nss/bin/targets/qualcommax/ipq807x/immortalwrt-qualcommax-ipq807x-redmi_ax6-stock-squashfs-factory.ubi
          getmd5 $rom
          cp -a $rom ./AX6_Out/Redmi-AX6-immortalwrt-factory-$(date +%Y%m%d)_${md5}.ubi

      - name: Upload Firmwares
        uses: actions/upload-artifact@main
        with:
          name: AX6-Firmware
          path: AX6_Out/Redmi-AX6*

      - name: Upload config
        uses: actions/upload-artifact@main
        with:
          name: AX6-config
          path: AX6_Out/AX6_imm.config

      - name: Upload Packages
        uses: actions/upload-artifact@main
        with:
          name: AX6-Packages
          path: imm-nss/bin/packages

  create_release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          find downloaded_artifacts \( -name "*.bin" -o -name "*.ubi" \) -exec cp {} release_assets \;

      - name: Generate release info
        id: release_info
        run: |
          echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "release_name=immortalwrt-红米AX6-$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.release_tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          files: |
            release_assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
